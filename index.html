<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT Sniper AI</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #001a14, #000);
    color: white;
}

.container {
    padding: 20px;
    text-align: center;
}

h1 {
    color: #00ffae;
    font-size: 32px;
    text-shadow: 0 0 20px #00ffae;
}

.card {
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    padding: 20px;
    margin-top: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,255,174,0.2);
}

button {
    background: #00ffae;
    border: none;
    padding: 15px 25px;
    border-radius: 12px;
    color: black;
    font-weight: bold;
    margin-top: 15px;
    cursor: pointer;
}

.result {
    margin-top: 20px;
    font-size: 18px;
}

.lock {
    opacity: 0.4;
}

.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #000;
    display: flex;
    justify-content: space-around;
    padding: 10px;
    border-top: 1px solid #222;
}
</style>
</head>

<body>

<div class="container">
    <h1>GOAT Sniper AI 🐐</h1>
    <p>Upload your chart. Unlock sniper setups.</p>

    <div class="card">
        <input type="file" id="file">
        <br>
        <button onclick="analyze()">Analyze Chart</button>
    </div>

    <div class="card result" id="result" style="display:none;">
        <h2>US30 • M1</h2>
        <p>Bias: <span id="bias"></span></p>
        <p>Confidence: <span id="confidence"></span></p>

        <div class="lock">
            <p>Entry: 🔒</p>
            <p>Stop Loss: 🔒</p>
            <p>Take Profit: 🔒</p>
        </div>

        <button onclick="alert('Upgrade to unlock')">Unlock Full Setup 🔓</button>
    </div>
</div>

<div class="bottom-nav">
    <span>Home</span>
    <span>Scan</span>
    <span>Pricing</span>
    <span>Refer</span>
</div>

<script>
function analyze(){
    document.getElementById("result").style.display = "block";

    let bias = Math.random() > 0.5 ? "Bullish 📈" : "Bearish 📉";
    let confidence = Math.floor(Math.random()*30)+70 + "%";

    document.getElementById("bias").innerText = bias;
    document.getElementById("confidence").innerText = confidence;
}
</script>

</body>
</html>
